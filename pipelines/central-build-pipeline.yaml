apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: central-build-pipeline
spec:
  description: >-
    A centralized build pipeline that auto-detects project type,
    runs the appropriate build task, and pushes a container image to Quay.
  params:
    - name: repo-url
      type: string
      description: The Git repository URL
    - name: repo-name
      type: string
      description: The name of the repository
    - name: commit-sha
      type: string
      description: The Git commit SHA
    - name: branch
      type: string
      description: The Git branch ref
    - name: context-dir
      type: string
      default: "."
      description: Subdirectory within the repo containing the project
  workspaces:
    - name: source
      description: Shared workspace for the pipeline source code
  tasks:
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.commit-sha)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: ""
      workspaces:
        - name: output
          workspace: source

    - name: build-detect-type
      taskRef:
        name: build-detect-type
      runAfter:
        - git-clone
      params:
        - name: context-dir
          value: $(params.context-dir)
      workspaces:
        - name: source
          workspace: source

    - name: build-java-maven
      taskRef:
        name: build-java-maven
      runAfter:
        - build-detect-type
      when:
        - input: $(tasks.build-detect-type.results.build-type)
          operator: in
          values:
            - "java-maven"
      params:
        - name: context-dir
          value: $(params.context-dir)
      workspaces:
        - name: source
          workspace: source

    - name: build-python
      taskRef:
        name: build-python
      runAfter:
        - build-detect-type
      when:
        - input: $(tasks.build-detect-type.results.build-type)
          operator: in
          values:
            - "python"
      params:
        - name: context-dir
          value: $(params.context-dir)
      workspaces:
        - name: source
          workspace: source

    - name: build-image-push
      taskRef:
        name: build-image-push
      runAfter:
        - build-java-maven
        - build-python
      params:
        - name: IMAGE_NAME
          value: $(params.repo-name)
        - name: IMAGE_TAG
          value: $(params.commit-sha)
        - name: context-dir
          value: $(params.context-dir)
      workspaces:
        - name: source
          workspace: source
